<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Alunos</title>

<style>
    /* Variáveis para facilitar manutenção e consistência */
    :root {
        --primary-color: #4361ee;
        --primary-hover: #3a56d4;
        --success-color: #28a745;
        --success-hover: #218838;
        --danger-color: #dc3545;
        --gray-light: #f8f9fa;
        --gray-border: #dee2e6;
        --text-color: #212529;
        --text-muted: #6c757d;
        --border-radius: 8px;
        --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        --transition: all 0.2s ease-in-out;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        max-width: 800px;
        width: 100%;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        color: var(--text-color);
        margin-bottom: 10px;
        font-weight: 600;
        font-size: 2rem;
        border-bottom: 3px solid var(--primary-color);
        padding-bottom: 10px;
    }

    h2 {
        color: var(--text-color);
        margin: 20px 0 10px;
        font-weight: 500;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        padding: 12px 15px;
        border-bottom: 1px solid var(--gray-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: var(--transition);
    }

    li:hover {
        background-color: var(--gray-light);
    }

    li:last-child {
        border-bottom: none;
    }

    /* Estilização do formulário */
    form {
        margin-top: 25px;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    label {
        font-weight: 600;
        color: var(--text-color);
        margin-top: 10px;
        font-size: 0.95rem;
    }

    label:first-of-type {
        margin-top: 0;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--gray-border);
        border-radius: var(--border-radius);
        font-size: 1rem;
        transition: var(--transition);
        background-color: white;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }

    input:disabled {
        background-color: var(--gray-light);
        cursor: not-allowed;
    }

    small {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-top: -5px;
        margin-bottom: 10px;
        display: block;
    }

    /* Botões */
    button {
        padding: 12px 24px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: var(--border-radius);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 15px;
        align-self: flex-start;
    }

    button:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    }

    button:active {
        transform: translateY(0);
    }

    button[type="submit"] {
        background: var(--success-color);
    }

    button[type="submit"]:hover {
        background: var(--success-hover);
    }

    a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
    }

    a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }

    /* Layout responsivo */
    @media (max-width: 600px) {
        body {
            padding: 10px;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 1.5rem;
        }

        button {
            width: 100%;
            align-self: stretch;
        }
    }

    /* Classe auxiliar para mensagens de erro/sucesso */
    .message {
        padding: 12px 20px;
        border-radius: var(--border-radius);
        margin-bottom: 20px;
        font-weight: 500;
    }

    .message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    /* Estilo para o botão de voltar ou links em linha com botões */
    .button-link {
        display: inline-block;
        padding: 10px 20px;
        background: var(--gray-light);
        color: var(--text-color);
        border-radius: var(--border-radius);
        margin-left: 10px;
    }

    .button-link:hover {
        background: var(--gray-border);
        text-decoration: none;
    }
</style>

<script>
//conecta a api do via cep pra preencher as informações de endereço automaticamente pelo cep 
    function buscarCEP(){

        let cep = document.getElementById("cep").value.replace("-", "");

        if(cep.length != 8){
            return;
        }

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(response => response.json())
        .then(data => {

            if(data.erro){
                alert("CEP não encontrado");
                return;
            }

            document.getElementById("rua").value = data.logradouro;
            document.getElementById("bairro").value = data.bairro;
            document.getElementById("cidade").value = data.localidade;
            document.getElementById("estado").value = data.uf;

        });

}

</script>

</head>

<body>

<div class="container">

<h1>Cadastro de Alunos</h1>

<h2>Alunos cadastrados</h2>

<ul>

{% for pessoa in pessoas %}

<li>

<strong>{{ pessoa.nome }}</strong>

<br>

ID: {{ pessoa.id }}  
Idade: {{ pessoa.idade }}  
Email: {{ pessoa.email }}

<br>

<a href="{% url 'editar' pessoa.id %}">Editar</a>
<a href="{% url 'delete' pessoa.id %}">Excluir</a>

</li>

{% empty %}

<li>Nenhum aluno cadastrado</li>

{% endfor %}

</ul>

<hr>

<h2>Novo aluno</h2>

<form action="{% url 'salvar' %}" method="POST">

{% csrf_token %}

<label>Nome</label>
<input type="text" name="nome" required placeholder="Ex: Eduardo Cauã">

<label>Idade</label>
<input type="number" name="idade" required>

<label>Email</label>
<input type="email" name="email" required>

<label>CPF</label>
<input type="text" name="cpf" required>

<label>CEP</label>
<input type="text" id="cep" name="cep" onblur="buscarCEP()" placeholder="Digite o CEP" required>

<label>Rua</label>
<input type="text" id="rua" name="rua">

<label>Bairro</label>
<input type="text" id="bairro" name="bairro">

<label>Cidade</label>
<input type="text" id="cidade" name="cidade">

<label>Estado</label>
<input type="text" id="estado" name="estado">

<button type="submit">
Cadastrar aluno
</button>

</form>

</div>

</body>
</html>
